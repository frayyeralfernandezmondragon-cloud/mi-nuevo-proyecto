<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Ti</title>
    <style>
        :root {
            --bg-color: #ff4d6d; 
            --text-color: #ffffff; 
        }

        /* Configuración del cuerpo de la página */
        body {
            margin: 0;
            padding: 0;
            background-color: #ffeef2;
            overflow: hidden; 
            height: 100vh;
            width: 100vw;
            position: relative;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Centro de rotación del fondo */
        .universo-corazones {
            position: absolute;
            width: 0;
            height: 0;
            top: 50%;
            left: 50%;
            z-index: 1;
            animation: girarEstrella 40s linear infinite; 
        }

        /* Cada corazón individual */
        .corazon-particula {
            position: absolute;
            font-size: 1.5rem;
            text-shadow: 0 0 5px rgba(255, 77, 109, 0.3);
            transform: translate(-50%, -50%);
            opacity: 0.7;
        }

        /* Animación para que giren los corazones */
        @keyframes girarEstrella {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Tarjeta principal */
        .para_Ti {
            position: absolute;
            top: 15%; 
            width: 90%;
            max-width: 420px; 
            padding: 25px;
            box-sizing: border-box;
            background-color: var(--bg-color);
            color: var(--text-color); 
            z-index: 10; 
            display: flex;
            flex-direction: column; 
            align-items: center;
            justify-content: center;
            text-align: center;
            border-radius: 20px; 
            box-shadow: 0 12px 35px rgba(255, 77, 109, 0.5); 
        }

        /* Estilo de la foto circular */
        .foto-pareja {
            width: 140px;
            height: 140px;
            border-radius: 50%; 
            border: 4px solid #ffffff; 
            object-fit: cover; 
            margin-bottom: 15px; 
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        /* Estilo del texto */
        .mensaje-amor {
            font-size: 1.25rem;
            line-height: 1.6;
            margin: 0;
            font-weight: 500;
        }

        /* Contenedor del reproductor de música */
        .reproductor-musica {
            position: absolute;
            top: 75%; 
            z-index: 10;
            background: rgba(255, 255, 255, 0.95);
            padding: 10px 15px;
            border-radius: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
        }

        .reproductor-musica audio {
            height: 35px;
        }
    </style>
</head>
<body>

    <div class="universo-corazones" id="capaCorazones"></div>

    <div class="para_Ti">
        <img src="nuestra_foto.jpg" alt="Nosotros" class="foto-pareja">
        
        <p class="mensaje-amor">
            Olvida lo pasado y dame una oportunidad mas para arreglar las cosas contigo, y estar juntos contigo por que mi vida sin ti es como una hoja en blanco. ❤️
        </p>
    </div>

    <div class="reproductor-musica">
        <audio controls autoplay loop>
            <source src="terrateniente.mp3" type="audio/mpeg">
            Tu navegador no soporta audio.
        </audio>
    </div>

    <script>
        const contenedor = document.getElementById('capaCorazones');
        const cantidadCorazones = 140; 
        const tiposCorazones = ['❤️', '💕', '💖', '🌸'];

        for (let i = 0; i < cantidadCorazones; i++) {
            const corazon = document.createElement('div');
            corazon.classList.add('corazon-particula');
            corazon.innerText = tiposCorazones[Math.floor(Math.random() * tiposCorazones.length)];
            
            const angulo = i * 0.45; 
            const radio = 20 + (i * 4.8); 
            
            const x = Math.cos(angulo) * radio;
            const y = Math.sin(angulo) * radio;
            
            corazon.style.left = `${x}px`;
            corazon.style.top = `${y}px`;
            
            const tamano = 0.6 + Math.random() * 1.1;
            corazon.style.transform = `translate(-50%, -50%) scale(${tamano})`;
            
            contenedor.appendChild(corazon);
        }
    </script>
</body>
</html>
